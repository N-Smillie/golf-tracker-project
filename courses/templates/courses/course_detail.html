{% extends "base.html" %}

{% block content %}

<div class="container-fluid py-4">
<!-- Header -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4">
        <div>
            <h2>{{ course.name }}</h2>
            <span>Course Scorecard</span>
        </div>

        <div class="mt-3 mt-md-0">
            <a href="{% url 'start_round' %}" class="btn btn-primary">
                Start Round
            </a>
        </div>
    </div>

    <!-- Scorecard -->
    <div class="card shadow-sm">
        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered text-center align-middle">

                    <thead>
                        <tr>
                            <th>Hole</th>
                            {% for hole in holes %}
                                <th>{{ hole.number }}</th>
                            {% endfor %}
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <th>Par</th>
                            {% for hole in holes %}
                                <td class="
                                    {% if hole.par == 3 %}
                                        par-3
                                    {% elif hole.par == 4 %}
                                        par-4
                                    {% elif hole.par == 5 %}
                                        par-5
                                    {% endif %}
                                ">
                                    {{ hole.par }}
                                </td>
                            {% endfor %}
                        </tr>

                    </tbody>

                </table>

            </div>

        </div>
    </div>

</div>


{% endblock %}
