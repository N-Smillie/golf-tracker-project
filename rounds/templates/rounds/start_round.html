{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h3 class="mb-4 text-center">Start New Round</h3>

                    <form method="POST">
                        {% csrf_token %}

                        <!-- Bootstrap form -->
                        <div class="mb-3 text-center">
                            <label class="form-label">Select Course</label>
                            {{ form.course }}
                        </div>

                        <div class="mb-3 text-center">
                            <label class="form-label">Holes Played</label>
                            {{ form.holes_played }}
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Start Round
                        </button>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
