{% extends "base.html" %}

{% block content %}

<div class="container-fluid py-4">
    <h2 class="mb-4">Round History</h2>

    <div class="card">
        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-striped align-middle">

                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Course</th>
                            <th>Holes</th>
                            <th></th>
                        </tr>
                    </thead>

                    <tbody>
                        {% for round in rounds %}
                        <tr>
                            <td>{{ round.date }}</td>
                            <td>{{ round.course.name }}</td>
                            <td>{{ round.get_holes_played_display }}</td>
                            <td>
                                <a href="{% url 'round_detail' round.id %}" 
                                   class="btn btn-sm btn-outline-primary">
                                    View Round
                                </a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="4" class="text-center">
                                No rounds played yet
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

{% endblock %}
